version: 2
updates:
- package-ecosystem: bundler
  directory: "/"
  schedule:
    interval: daily
  open-pull-requests-limit: 10
  cooldown:
    default-days: 5
    semver-patch-days: 5
    semver-minor-days: 10
    semver-major-days: 15
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: daily
  open-pull-requests-limit: 10
  cooldown:
    default-days: 5
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: daily
  open-pull-requests-limit: 10
  cooldown:
    default-days: 5
    semver-patch-days: 5
    semver-minor-days: 10
    semver-major-days: 15
  groups:
    babel:
      patterns:
        - "@babel/*"
